services:
  ollama:
    image: ollama/ollama:latest
    container_name: medscope-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  medscope:
    build:
      context: .
      dockerfile: docker_file
    container_name: medscope-app
    ports:
      - "8501:8501"
    depends_on:
      - ollama
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: mistral
    restart: unless-stopped

volumes:
  ollama_data:
